{% extends "base.html" %}
{% block title %}Register — FreelancerFinance{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>Create your account</h1>
  <p class="subtitle">Start tracking your freelance income in minutes.</p>

  <form method="POST">
    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Astri Hernandez" required>
    </div>
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm Password</label>
      <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
    </div>
    <button type="submit" class="btn btn-primary">Create Account</button>
  </form>

  <p class="auth-link">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>
{% endblock %}
