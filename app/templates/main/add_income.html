{% extends "base.html" %}
{% block title %}Add Income — FreelancerFinance{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Add Income Entry</h1>
  <p>Log a new payment you've received or are expecting.</p>
</div>

<div class="form-card">
  <form method="POST">
    <div class="form-row">
      <div class="form-group">
        <label for="client_name">Client Name *</label>
        <input type="text" id="client_name" name="client_name" placeholder="e.g. Acme Corp" required>
      </div>
      <div class="form-group">
        <label for="project_name">Project Name *</label>
        <input type="text" id="project_name" name="project_name" placeholder="e.g. Website Redesign" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="amount">Amount ($) *</label>
        <input type="number" id="amount" name="amount" step="0.01" min="0" placeholder="1500.00" required>
      </div>
      <div class="form-group">
        <label for="date_received">Date *</label>
        <input type="date" id="date_received" name="date_received" value="{{ today }}" required>
      </div>
    </div>

    <div class="form-group">
      <label for="status">Status *</label>
      <select id="status" name="status">
        <option value="paid">Paid</option>
        <option value="pending">Pending</option>
        <option value="overdue">Overdue</option>
      </select>
    </div>

    <div class="form-group">
      <label for="notes">Notes (optional)</label>
      <textarea id="notes" name="notes" rows="3" placeholder="Any additional details..."></textarea>
    </div>

    <div class="form-actions">
      <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">Save Entry</button>
    </div>
  </form>
</div>
{% endblock %}
